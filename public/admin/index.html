<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="robots" content="noindex" />
    <title>Vision Andalucia · Panel de contenido</title>
  </head>
  <body>
    <!-- Decap CMS: panel de edición sin código.
         Versión 3.8.3+ requerida por el login PKCE de DecapBridge. -->
    <script src="https://unpkg.com/decap-cms@^3.8.3/dist/decap-cms.js"></script>

    <!-- Bloques personalizados del editor: YouTube e iframe genérico.
         Se guardan como HTML dentro del Markdown, y Astro los renderiza. -->
    <script>
      // Extrae el ID de un vídeo de YouTube desde cualquier formato de URL.
      function youtubeId(url) {
        if (!url) return '';
        var m = url.match(
          /(?:youtu\.be\/|youtube\.com\/(?:watch\?v=|embed\/|shorts\/|live\/))([\w-]{11})/
        );
        if (m) return m[1];
        return /^[\w-]{11}$/.test(url.trim()) ? url.trim() : '';
      }

      function youtubeIframe(id) {
        return (
          '<div class="embed embed--video"><iframe ' +
          'src="https://www.youtube-nocookie.com/embed/' + id + '" ' +
          'title="Vídeo de YouTube" loading="lazy" frameborder="0" ' +
          'allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" ' +
          'allowfullscreen></iframe></div>'
        );
      }

      // Bloque: Vídeo de YouTube
      CMS.registerEditorComponent({
        id: 'youtube',
        label: 'Vídeo de YouTube',
        fields: [
          {
            name: 'url',
            label: 'URL o ID de YouTube',
            widget: 'string',
            hint: 'Pega el enlace del vídeo (youtube.com/watch?v=… o youtu.be/…).',
          },
        ],
        pattern: /^<div class="embed embed--video"><iframe src="https:\/\/www\.youtube-nocookie\.com\/embed\/([\w-]{11})"/,
        fromBlock: function (match) {
          return { url: 'https://youtu.be/' + match[1] };
        },
        toBlock: function (obj) {
          var id = youtubeId(obj.url);
          return id
            ? youtubeIframe(id)
            : '<!-- YouTube: revisa la URL «' + (obj.url || '') + '» -->';
        },
        toPreview: function (obj) {
          var id = youtubeId(obj.url);
          return id ? youtubeIframe(id) : 'Vídeo de YouTube (URL no válida)';
        },
      });

      // Bloque: iframe / embed genérico (mapas, formularios, etc.)
      CMS.registerEditorComponent({
        id: 'embed',
        label: 'Insertar iframe / embed',
        fields: [
          {
            name: 'url',
            label: 'URL a insertar (src del iframe)',
            widget: 'string',
          },
          {
            name: 'alto',
            label: 'Alto en píxeles (opcional)',
            widget: 'string',
            required: false,
            hint: 'Déjalo vacío para formato panorámico 16:9 responsive.',
          },
        ],
        pattern: /^<div class="embed(?:[^"]*)"[^>]*><iframe src="([^"]*)"/,
        fromBlock: function (match) {
          return { url: match[1] };
        },
        toBlock: function (obj) {
          if (!obj.url) return '<!-- iframe sin URL -->';
          var style = obj.alto
            ? ' style="height:' + parseInt(obj.alto, 10) + 'px"'
            : '';
          return (
            '<div class="embed"' + style + '><iframe ' +
            'src="' + obj.url + '" loading="lazy" frameborder="0" ' +
            'allowfullscreen></iframe></div>'
          );
        },
        toPreview: function (obj) {
          return obj.url
            ? '<div class="embed"><iframe src="' + obj.url + '" frameborder="0"></iframe></div>'
            : 'iframe (sin URL)';
        },
      });

      /* ---- Previsualización con el diseño real de la web ---- */

      // Tipografías y estilos del sitio dentro del panel de preview
      CMS.registerPreviewStyle(
        'https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&family=Playfair+Display:ital,wght@0,400;0,500;0,700;1,400&display=swap'
      );
      CMS.registerPreviewStyle('/admin/preview.css');

      var SECTOR_LABELS = {
        residencial: 'Residencial',
        living: 'Living',
        retail: 'Retail',
        oficinas: 'Oficinas',
        hoteles: 'Hoteles',
        industrial: 'Industrial & Logistics',
        agribusiness: 'Agribusiness',
        tendencias: 'Tendencias del sector',
      };
      var MESES = ['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];

      var NoticiaPreview = createClass({
        render: function () {
          var entry = this.props.entry;
          var data = entry.get('data');
          var getAsset = this.props.getAsset;

          var titulo = data.get('titulo') || '';
          var resumen = data.get('resumen') || '';
          var sector = data.get('sector') || '';
          var categoria = data.get('categoria');
          var autor = data.get('autor') || '';
          var autorCargo = data.get('autorCargo');
          var fecha = data.get('fecha');
          var imagen = data.get('imagen');
          var video = data.get('video');

          var etiqueta = String(categoria || SECTOR_LABELS[sector] || sector).toUpperCase();

          var fechaTxt = '';
          if (fecha) {
            var d = new Date(fecha);
            if (!isNaN(d.getTime())) {
              fechaTxt = d.getDate() + ' ' + MESES[d.getMonth()] + ' ' + d.getFullYear();
            }
          }

          var imgSrc = imagen ? getAsset(imagen) : '/uploads/placeholder.svg';

          var videoEl = null;
          if (video) {
            var id = youtubeId(video);
            if (id) {
              videoEl = h('div', { className: 'embed embed--video' },
                h('iframe', {
                  src: 'https://www.youtube-nocookie.com/embed/' + id,
                  frameBorder: '0',
                  allowFullScreen: true,
                  title: 'Vídeo',
                })
              );
            }
          }

          return h('article', { className: 'entrada' },
            h('header', { className: 'entrada__head contenedor' },
              h('span', { className: 'tag' }, etiqueta),
              h('h1', { className: 'entrada__titulo' }, titulo),
              h('div', { className: 'entrada__autor' },
                h('p', { className: 'entrada__autor-nombre' }, autor),
                autorCargo ? h('p', { className: 'entrada__autor-cargo' }, autorCargo) : null
              ),
              h('time', { className: 'entrada__fecha' }, fechaTxt)
            ),
            h('figure', { className: 'entrada__portada full-bleed' },
              h('img', { src: imgSrc, alt: data.get('imagenAlt') || '' })
            ),
            h('div', { className: 'entrada__cuerpo contenedor' },
              resumen ? h('p', { className: 'entrada__lead' }, resumen) : null,
              videoEl,
              h('div', { className: 'prosa' }, this.props.widgetFor('body'))
            )
          );
        },
      });

      CMS.registerPreviewTemplate('noticias', NoticiaPreview);
    </script>
  </body>
</html>
