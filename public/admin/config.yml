# Configuración de Decap CMS — panel de contenido de Vision Andalucia.
# Documentación: https://decapcms.org/docs/

# --- Backend: DecapBridge (login PKCE, sin Netlify Identity) ----------------
# Los editores inician sesión vía DecapBridge y los cambios se guardan como
# commits en la rama `main` del repo de GitHub. Valores generados por DecapBridge.
backend:
  name: git-gateway
  repo: oscarnieto/Vision-Andalucia
  branch: main
  auth_type: pkce
  base_url: https://auth.decapbridge.com
  auth_endpoint: /sites/096c0e0d-02b5-4142-bdee-ecd8dfa3ffa0/pkce
  auth_token_endpoint: /sites/096c0e0d-02b5-4142-bdee-ecd8dfa3ffa0/token
  gateway_url: https://gateway.decapbridge.com
  # Mensajes de commit legibles (quién hizo qué)
  commit_messages:
    create: 'Create {{collection}} "{{slug}}" - {{author-name}} <{{author-login}}> via DecapBridge'
    update: 'Update {{collection}} "{{slug}}" - {{author-name}} <{{author-login}}> via DecapBridge'
    delete: 'Delete {{collection}} "{{slug}}" - {{author-name}} <{{author-login}}> via DecapBridge'
    uploadMedia: 'Upload "{{path}}" - {{author-name}} <{{author-login}}> via DecapBridge'
    deleteMedia: 'Delete "{{path}}" - {{author-name}} <{{author-login}}> via DecapBridge'
    openAuthoring: 'Message {{message}} - {{author-name}} <{{author-login}}> via DecapBridge'

# Campos del usuario que envía DecapBridge (requerido por el login PKCE)
auth:
  email_claim: email
  first_name_claim: first_name
  last_name_claim: last_name
  avatar_url_claim: avatar_url

# Logo en la pantalla de login del panel
logo_url: https://decapbridge.com/decapcms-with-bridge.svg

# Enlaces "Ver sitio" dentro del panel
site_url: https://vision-andalucia.netlify.app

# Carpeta donde Decap sube imágenes/vídeos. Astro copia public/ tal cual,
# así que quedan servidos en /uploads/...
media_folder: "public/uploads"
public_folder: "/uploads"

# Idioma del panel
locale: "es"

# --- Colecciones (formularios) ---------------------------------------------
collections:
  - name: "noticias"
    label: "Noticias"
    label_singular: "Noticia"
    description: "Todas las noticias del sitio. Usa Ordenar, Filtrar y Agrupar para organizarlas."
    identifier_field: "titulo"
    folder: "src/content/noticias"
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    # Enlace "Ver en la web" desde el panel
    preview_path: "noticia/{{slug}}"
    # Resumen de cada fila del listado
    summary: "{{titulo}}  ·  {{fecha | date('DD/MM/YYYY')}}"
    # Ordenar por…
    sortable_fields:
      - fecha
      - titulo
      - sector
      - autor
    # Filtrar por… (chips)
    view_filters:
      - label: "Sector · Residencial"
        field: sector
        pattern: residencial
      - label: "Sector · Living"
        field: sector
        pattern: living
      - label: "Sector · Retail"
        field: sector
        pattern: retail
      - label: "Sector · Oficinas"
        field: sector
        pattern: oficinas
      - label: "Sector · Hoteles"
        field: sector
        pattern: hoteles
      - label: "Sector · Industrial & Logistics"
        field: sector
        pattern: industrial
      - label: "Sector · Agribusiness"
        field: sector
        pattern: agribusiness
      - label: "Sector · Tendencias"
        field: sector
        pattern: tendencias
      - label: "Solo destacadas"
        field: destacada
        pattern: true
      - label: "Solo borradores"
        field: borrador
        pattern: true
    # Agrupar por… (categoriza el listado)
    view_groups:
      - label: "Sector"
        field: sector
      - label: "Autor"
        field: autor
      - label: "Estado (borrador)"
        field: borrador
    fields:
      - { name: "titulo", label: "Título", widget: "string" }
      - {
          name: "resumen",
          label: "Resumen / entradilla",
          widget: "text",
          hint: "Frase breve para tarjetas y buscadores (máx. 300 caracteres).",
          pattern: ['^.{1,300}$', "Máximo 300 caracteres"],
        }
      - {
          name: "sector",
          label: "Sector",
          widget: "select",
          options:
            [
              { label: "Residencial", value: "residencial" },
              { label: "Living", value: "living" },
              { label: "Retail", value: "retail" },
              { label: "Oficinas", value: "oficinas" },
              { label: "Hoteles", value: "hoteles" },
              { label: "Industrial & Logistics", value: "industrial" },
              { label: "Agribusiness", value: "agribusiness" },
              { label: "Tendencias del sector", value: "tendencias" },
            ],
        }
      - {
          name: "categoria",
          label: "Categoría (tag amarillo)",
          widget: "string",
          required: false,
          hint: "Texto del tag sobre el titular. Si se deja vacío se usa el sector. Ej.: Residencial obra nueva.",
        }
      - {
          name: "tags",
          label: "Etiquetas / temas",
          widget: "list",
          default: [],
          hint: "Sirven para relacionar noticias entre sí. Ej.: málaga, empleo, IA.",
        }
      - {
          name: "fecha",
          label: "Fecha de publicación",
          widget: "datetime",
          format: "YYYY-MM-DDTHH:mm:ssZ",
          date_format: "DD/MM/YYYY",
          time_format: "HH:mm",
          picker_utc: false,
        }
      - {
          name: "fechaActualizacion",
          label: "Fecha de actualización",
          widget: "datetime",
          required: false,
          format: "YYYY-MM-DDTHH:mm:ssZ",
          date_format: "DD/MM/YYYY",
          time_format: "HH:mm",
          picker_utc: false,
        }
      - {
          name: "autor",
          label: "Autor",
          widget: "string",
          default: "Redacción Visión Andalucía",
        }
      - {
          name: "autorCargo",
          label: "Cargo del autor",
          widget: "string",
          required: false,
          hint: "Segunda línea bajo el nombre. Ej.: Director Residential Sales, Savills Andalucía.",
        }
      - {
          name: "imagen",
          label: "Imagen de portada",
          widget: "image",
          required: false,
          choose_url: true,
          hint: "Se muestra en la cabecera del artículo y en las tarjetas.",
        }
      - {
          name: "imagenAlt",
          label: "Texto alternativo de la imagen",
          widget: "string",
          required: false,
          hint: "Describe la imagen (accesibilidad y SEO).",
        }
      - {
          name: "video",
          label: "Vídeo (URL)",
          widget: "string",
          required: false,
          hint: "Pega el enlace de YouTube, Vimeo o un .mp4.",
        }
      - {
          name: "destacada",
          label: "¿Destacada en portada?",
          widget: "boolean",
          default: false,
          hint: "Si se activa, esta noticia sale como card grande al inicio de la home. Si marcas varias, se usa la más reciente.",
        }
      - {
          name: "borrador",
          label: "Borrador (no publicar)",
          widget: "boolean",
          default: false,
        }
      - name: "body"
        label: "Cuerpo del artículo"
        widget: "markdown"
        hint: "Editor visual. Al hacer clic dentro aparece la barra: títulos, negrita, listas, citas, imágenes, y los bloques de YouTube e iframe (botón +)."
        # Botones de formato de la barra
        buttons:
          - bold
          - italic
          - link
          - heading-two
          - heading-three
          - quote
          - bulleted-list
          - numbered-list
        # Bloques insertables con el botón "+": imagen, código y los nuestros
        editor_components:
          - image
          - code-block
          - youtube
          - embed

  # --- Páginas / Landings (informes) ---------------------------------------
  - name: "paginas"
    label: "Páginas"
    label_singular: "Página"
    description: "Landings tipo informe: hero + texto + rejilla de noticias. Se publican en /informe/…"
    identifier_field: "titulo"
    folder: "src/content/paginas"
    create: true
    slug: "{{slug}}"
    summary: "{{titulo}}"
    fields:
      - {
          name: "titulo",
          label: "Título (define la URL)",
          widget: "string",
          hint: "La página se publica en /informe/[versión-del-título].",
        }
      - {
          name: "borrador",
          label: "Borrador (no publicar)",
          widget: "boolean",
          default: false,
        }
      - {
          name: "fecha",
          label: "Fecha",
          widget: "datetime",
          required: false,
          format: "YYYY-MM-DDTHH:mm:ssZ",
          date_format: "DD/MM/YYYY",
          time_format: "HH:mm",
          picker_utc: false,
        }
      # --- Hero ---
      - {
          name: "heroImagen",
          label: "Hero · Imagen de fondo",
          widget: "image",
          required: false,
          hint: "Imagen grande de cabecera, a todo el ancho.",
        }
      - {
          name: "heroImagenAlt",
          label: "Hero · Texto alternativo de la imagen",
          widget: "string",
          required: false,
        }
      - {
          name: "etiqueta",
          label: "Hero · Etiqueta (pastilla amarilla)",
          widget: "string",
          required: false,
          hint: "Ej.: 25 aniversario. Se deja vacío para no mostrarla.",
        }
      - { name: "titular", label: "Hero · Titular", widget: "string" }
      - {
          name: "autor",
          label: "Hero · Autor",
          widget: "string",
          required: false,
        }
      - {
          name: "autorCargo",
          label: "Hero · Cargo del autor",
          widget: "string",
          required: false,
        }
      # --- Texto introductorio ---
      - {
          name: "entradilla",
          label: "Entradilla (texto grande en negrita)",
          widget: "text",
          required: false,
        }
      - {
          name: "body",
          label: "Texto introductorio (cuerpo)",
          widget: "markdown",
          required: false,
          hint: "Editor visual, igual que en las noticias.",
        }
      # --- Selección de noticias para la rejilla ---
      - name: "modo"
        label: "¿Cómo se eligen las noticias de la rejilla?"
        widget: "select"
        default: "manual"
        options:
          - { label: "Manual (las elijo yo)", value: "manual" }
          - { label: "Por sector (automático)", value: "sector" }
          - { label: "Por etiqueta (automático)", value: "tag" }
      - name: "noticias"
        label: "Noticias (solo modo Manual)"
        widget: "relation"
        collection: "noticias"
        search_fields: ["titulo"]
        value_field: "{{slug}}"
        display_fields: ["titulo"]
        multiple: true
        required: false
        hint: "Busca y añade las noticias en el orden que quieras que aparezcan."
      - name: "sector"
        label: "Sector (solo modo Por sector)"
        widget: "select"
        required: false
        options:
          - { label: "Residencial", value: "residencial" }
          - { label: "Living", value: "living" }
          - { label: "Retail", value: "retail" }
          - { label: "Oficinas", value: "oficinas" }
          - { label: "Hoteles", value: "hoteles" }
          - { label: "Industrial & Logistics", value: "industrial" }
          - { label: "Agribusiness", value: "agribusiness" }
          - { label: "Tendencias del sector", value: "tendencias" }
      - {
          name: "tag",
          label: "Etiqueta (solo modo Por etiqueta)",
          widget: "string",
          required: false,
        }
      - {
          name: "limite",
          label: "Nº máximo de tarjetas (modos automáticos)",
          widget: "number",
          default: 6,
          value_type: "int",
          min: 1,
        }
      - {
          name: "tituloSeccion",
          label: "Título sobre la rejilla",
          widget: "string",
          required: false,
          default: "Noticias relacionadas",
        }

  # --- Inicio: banner editable (un único elemento) -------------------------
  - name: "inicio"
    label: "Inicio"
    description: "Elementos de la página de inicio."
    files:
      - name: "banner"
        label: "Banner de inicio"
        file: "src/data/banner.json"
        description: "Banner a todo el ancho con texto y botón."
        fields:
          - {
              name: "activo",
              label: "Mostrar el banner",
              widget: "boolean",
              default: true,
              hint: "Desactívalo para ocultar el banner sin borrar su contenido.",
            }
          - {
              name: "imagen",
              label: "Imagen de fondo",
              widget: "image",
              hint: "Se muestra a todo el ancho de la pantalla.",
            }
          - {
              name: "imagenAlt",
              label: "Texto alternativo de la imagen",
              widget: "string",
              required: false,
            }
          - {
              name: "texto",
              label: "Texto",
              widget: "text",
            }
          - {
              name: "botonTexto",
              label: "Texto del botón",
              widget: "string",
              default: "Ver más",
            }
          - {
              name: "botonUrl",
              label: "Enlace del botón",
              widget: "string",
              default: "/",
              hint: "Ruta interna (p. ej. /sector/residencial/) o URL completa (https://...).",
            }
