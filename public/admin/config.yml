# Configuración de Decap CMS — panel de contenido de Vision Andalucia.
# Documentación: https://decapcms.org/docs/

# --- Backend: DecapBridge (login PKCE, sin Netlify Identity) ----------------
# Los editores inician sesión vía DecapBridge y los cambios se guardan como
# commits en la rama `main` del repo de GitHub. Valores generados por DecapBridge.
backend:
  name: git-gateway
  repo: oscarnieto/Vision-Andalucia
  branch: main
  auth_type: pkce
  base_url: https://auth.decapbridge.com
  auth_endpoint: /sites/096c0e0d-02b5-4142-bdee-ecd8dfa3ffa0/pkce
  auth_token_endpoint: /sites/096c0e0d-02b5-4142-bdee-ecd8dfa3ffa0/token
  gateway_url: https://gateway.decapbridge.com
  # Mensajes de commit legibles (quién hizo qué)
  commit_messages:
    create: 'Create {{collection}} "{{slug}}" - {{author-name}} <{{author-login}}> via DecapBridge'
    update: 'Update {{collection}} "{{slug}}" - {{author-name}} <{{author-login}}> via DecapBridge'
    delete: 'Delete {{collection}} "{{slug}}" - {{author-name}} <{{author-login}}> via DecapBridge'
    uploadMedia: 'Upload "{{path}}" - {{author-name}} <{{author-login}}> via DecapBridge'
    deleteMedia: 'Delete "{{path}}" - {{author-name}} <{{author-login}}> via DecapBridge'
    openAuthoring: 'Message {{message}} - {{author-name}} <{{author-login}}> via DecapBridge'

# Campos del usuario que envía DecapBridge (requerido por el login PKCE)
auth:
  email_claim: email
  first_name_claim: first_name
  last_name_claim: last_name
  avatar_url_claim: avatar_url

# Logo en la pantalla de login del panel
logo_url: https://decapbridge.com/decapcms-with-bridge.svg

# Enlaces "Ver sitio" dentro del panel
site_url: https://vision-andalucia.netlify.app

# Carpeta donde Decap sube imágenes/vídeos. Astro copia public/ tal cual,
# así que quedan servidos en /uploads/...
media_folder: "public/uploads"
public_folder: "/uploads"

# Idioma del panel
locale: "es"

# --- Colecciones (formularios) ---------------------------------------------
collections:
  - name: "noticias"
    label: "Noticias"
    label_singular: "Noticia"
    folder: "src/content/noticias"
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    # Vista de listado
    summary: "{{titulo}} — {{fecha | date('DD/MM/YYYY')}}"
    sortable_fields: ["fecha", "titulo", "sector"]
    view_filters:
      - label: "Borradores"
        field: borrador
        pattern: true
      - label: "Destacadas"
        field: destacada
        pattern: true
    fields:
      - { name: "titulo", label: "Título", widget: "string" }
      - {
          name: "resumen",
          label: "Resumen / entradilla",
          widget: "text",
          hint: "Frase breve para tarjetas y buscadores (máx. 300 caracteres).",
          pattern: ['^.{1,300}$', "Máximo 300 caracteres"],
        }
      - {
          name: "sector",
          label: "Sector",
          widget: "select",
          options:
            [
              { label: "Residencial", value: "residencial" },
              { label: "Living", value: "living" },
              { label: "Retail", value: "retail" },
              { label: "Oficinas", value: "oficinas" },
              { label: "Hoteles", value: "hoteles" },
              { label: "Industrial & Logistics", value: "industrial" },
              { label: "Agribusiness", value: "agribusiness" },
              { label: "Tendencias del sector", value: "tendencias" },
            ],
        }
      - {
          name: "categoria",
          label: "Categoría (tag amarillo)",
          widget: "string",
          required: false,
          hint: "Texto del tag sobre el titular. Si se deja vacío se usa el sector. Ej.: Residencial obra nueva.",
        }
      - {
          name: "tags",
          label: "Etiquetas / temas",
          widget: "list",
          default: [],
          hint: "Sirven para relacionar noticias entre sí. Ej.: málaga, empleo, IA.",
        }
      - {
          name: "fecha",
          label: "Fecha de publicación",
          widget: "datetime",
          format: "YYYY-MM-DDTHH:mm:ssZ",
          date_format: "DD/MM/YYYY",
          time_format: "HH:mm",
          picker_utc: false,
        }
      - {
          name: "fechaActualizacion",
          label: "Fecha de actualización",
          widget: "datetime",
          required: false,
          format: "YYYY-MM-DDTHH:mm:ssZ",
          date_format: "DD/MM/YYYY",
          time_format: "HH:mm",
          picker_utc: false,
        }
      - {
          name: "autor",
          label: "Autor",
          widget: "string",
          default: "Redacción Visión Andalucía",
        }
      - {
          name: "autorCargo",
          label: "Cargo del autor",
          widget: "string",
          required: false,
          hint: "Segunda línea bajo el nombre. Ej.: Director Residential Sales, Savills Andalucía.",
        }
      - {
          name: "imagen",
          label: "Imagen de portada",
          widget: "image",
          required: false,
          choose_url: true,
          hint: "Se muestra en la cabecera del artículo y en las tarjetas.",
        }
      - {
          name: "imagenAlt",
          label: "Texto alternativo de la imagen",
          widget: "string",
          required: false,
          hint: "Describe la imagen (accesibilidad y SEO).",
        }
      - {
          name: "video",
          label: "Vídeo (URL)",
          widget: "string",
          required: false,
          hint: "Pega el enlace de YouTube, Vimeo o un .mp4.",
        }
      - {
          name: "destacada",
          label: "¿Destacada en portada?",
          widget: "boolean",
          default: false,
        }
      - {
          name: "borrador",
          label: "Borrador (no publicar)",
          widget: "boolean",
          default: false,
        }
      - {
          name: "body",
          label: "Cuerpo del artículo",
          widget: "markdown",
          hint: "Texto completo. Admite subtítulos, negritas, listas, imágenes y citas.",
        }
